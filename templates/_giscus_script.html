<!-- Giscus - GitHub Discussions powered comments -->
<!-- Setup instructions:
1. Go to https://giscus.app
2. Sign in with your GitHub account
3. Select your repository for storing discussions
4. Choose category (e.g., "Announcements" or custom "Comments")
5. Copy the <script> tag they provide
6. Replace the one below with your configuration
7. Change data-theme in config.toml based on your chosen theme
-->

<script src="https://giscus.app/client.js"
        data-repo="kathiravanbtm/personalnote"
        data-repo-id=""
        data-category="Comments"
        data-category-id="YOUR_CATEGORY_ID"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="light"
        data-lang="en"
        crossorigin="anonymous"
        async>
</script>
